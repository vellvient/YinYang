<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>YinYang Test Page</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        .subtitle-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            font-size: 24px;
            border-radius: 8px;
            text-align: center;
        }

        .btn {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>阴阳汉字学习工具</h1>
    <p>这是一个测试页面，用于验证阴阳扩展是否正常工作。</p>
    <p>中国，正式名称为中华人民共和国，是位于东亚的主权国家。它是世界上人口第一多的国家。中国有悠久的历史和灿烂的文化。</p>

    <button id="add-sub" class="btn">Simulate asbplayer Subtitle Injection</button>
    <div id="video-area" style="margin-top:20px; height: 300px; background: #333; position: relative;">
        <!-- Subtitles will appear here -->
    </div>

    <script>
        const subs = [
            "你好，欢迎来到这个视频。",
            "我们将学习如何使用这个很酷的工具。",
            "学习中文非常有趣！",
            "这只是一个测试字幕。"
        ];
        let subIndex = 0;
        document.getElementById('add-sub').addEventListener('click', () => {
            const area = document.getElementById('video-area');
            const old = area.querySelector('.subtitle-container');
            if (old) old.remove();

            const div = document.createElement('div');
            div.className = 'subtitle-container';
            div.textContent = subs[subIndex % subs.length];
            area.appendChild(div);
            subIndex++;
        });
    </script>
</body>

</html>
